<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>ZenPulse - AI Affirmation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#9513ec",
                        "background-light": "#f7f6f8",
                        "background-dark": "#1b1022",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-card {
            background: linear-gradient(135deg, rgba(149, 19, 236, 0.1) 0%, rgba(27, 16, 34, 0.4) 100%);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(149, 19, 236, 0.2);
        }
        .glow-button {
            box-shadow: 0 0 20px rgba(149, 19, 236, 0.4);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-screen w-full flex-col overflow-hidden max-w-md mx-auto">
<!-- Top Navigation -->
<header class="flex items-center justify-between px-6 py-6">
<button class="flex items-center justify-center size-10 rounded-full bg-slate-100/10 hover:bg-slate-100/20 transition-colors">
<span class="material-symbols-outlined text-slate-100">arrow_back</span>
</button>
<h1 class="text-slate-100 text-lg font-semibold tracking-tight">Your AI Affirmation</h1>
<button class="flex items-center justify-center size-10 rounded-full bg-slate-100/10 hover:bg-slate-100/20 transition-colors">
<span class="material-symbols-outlined text-slate-100">share</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col px-6 pb-8">
<!-- Mood Badge -->
<div class="flex justify-center mt-4">
<div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-primary/20 border border-primary/30">
<span class="text-sm">🧘</span>
<span class="text-xs font-semibold tracking-wider uppercase text-primary/90">Calm</span>
</div>
</div>
<!-- Affirmation Card -->
<div class="flex-1 flex flex-col justify-center mt-8">
<div class="glass-card relative rounded-xl p-8 flex flex-col items-center text-center overflow-hidden min-h-[400px]">
<!-- Decorative background element -->
<div class="absolute -top-24 -right-24 size-64 bg-primary/20 rounded-full blur-[80px]"></div>
<div class="absolute -bottom-24 -left-24 size-64 bg-indigo-500/10 rounded-full blur-[80px]"></div>
<div class="relative z-10 flex flex-col h-full justify-center">
<span class="material-symbols-outlined text-primary/40 text-4xl mb-6">format_quote</span>
<p class="text-slate-100 text-3xl md:text-4xl font-light leading-snug tracking-tight">
                            I am at peace with <span class="text-primary font-medium">my past</span> and excited for my future. Each breath I take fills me with <span class="italic">tranquility</span> and strength.
                        </p>
<div class="mt-10 flex flex-col items-center gap-2">
<div class="h-1 w-12 bg-primary/30 rounded-full"></div>
<p class="text-slate-400 text-sm font-medium uppercase tracking-[0.2em]">Generated for you</p>
</div>
</div>
</div>
</div>
<!-- Bottom Actions -->
<div class="mt-10 space-y-4">
<button class="glow-button w-full h-16 bg-primary hover:bg-primary/90 rounded-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-white">auto_awesome</span>
<span class="text-white text-lg font-bold tracking-tight">Regenerate</span>
</button>
<button class="w-full h-16 bg-transparent border border-slate-100/20 hover:bg-slate-100/5 rounded-xl flex items-center justify-center gap-3 transition-all active:scale-[0.98]">
<span class="material-symbols-outlined text-slate-100">favorite</span>
<span class="text-slate-100 text-lg font-semibold">Save to Favorites</span>
</button>
</div>
</main>
<!-- Subtle Navigation Indicator -->
<div class="flex justify-center pb-4">
<div class="w-32 h-1.5 bg-slate-100/10 rounded-full"></div>
</div>
</div>
<!-- Decorative Screen Gradient Background -->
<div class="fixed inset-0 -z-10 pointer-events-none overflow-hidden">
<div class="absolute top-1/4 -right-1/4 size-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 -left-1/4 size-[500px] bg-indigo-900/10 rounded-full blur-[120px]"></div>
</div>
</body></html>
